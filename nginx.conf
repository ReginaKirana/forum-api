limit_req_zone $binary_remote_addr zone=one:10m rate=90r/m;

server {
    listen 80;
    server_name 139-180-215-230.sslip.io;
    
    # Redirect HTTP to HTTPS is handled by certbot automatically usually, but we keep this for local/manual setup
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    # listen 443 ssl; will be added by certbot, so we define listen 443 explicitly if we have certs, else certbot modifies it.
    
    # Since we are putting this file locally as a requirement for submission,
    # the exact listen 443 config can be left as basic or customized by Certbot later.
    listen 443 ssl;
    server_name 139-180-215-230.sslip.io;
    
    # Let's encrypt path will be added by certbot
    ssl_certificate /etc/letsencrypt/live/139-180-215-230.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/139-180-215-230.sslip.io/privkey.pem;

    location / {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Implement NGINX rate limit specifically for /threads as per requirement
    location ^~ /threads {
        limit_req zone=one;
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
