# Konfigurasi NGINX untuk Forum API
# Letakkan file ini di root proyek untuk memenuhi kriteria submission

# 1. Definisi Zone Rate Limit (di dalam block http)
limit_req_zone $binary_remote_addr zone=api_limit:1m rate=90r/m;

server {
    listen 80;
    server_name 139.180.215.230.sslip.io;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name 139.180.215.230.sslip.io;

    ssl_certificate /etc/letsencrypt/live/139.180.215.230.sslip.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/139.180.215.230.sslip.io/privkey.pem;

    # Rate Limiting hanya untuk /threads
    location /threads {
        limit_req zone=api_limit;
        limit_req_status 429;

        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Custom Error Response untuk Rate Limit (JSON)
    error_page 429 = @rate_limited;
    location @rate_limited {
        default_type application/json;
        return 429 '{"status": "fail", "message": "Melebihi batas permintaan, silakan coba lagi nanti."}';
    }
}
